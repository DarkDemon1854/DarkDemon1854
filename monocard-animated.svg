</text>
</g>
</g>

<!-- 7 -->
<g class="slide" style="animation-delay:21.6s">
<rect width="400" height="220" rx="22" fill="url(#glassFill)" stroke="rgba(255,255,255,.14)"/>
<g clip-path="url(#clipCard)">
<rect width="180" height="320" y="-50" fill="url(#sheenGrad)" class="sheen"/>
</g>
<g transform="translate(34 54)">
<text fill="white" class="font-sans" font-size="25" font-weight="700">Mirror Bot</text>
