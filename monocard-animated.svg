</text>
</g>
</g>

<!-- 5 -->
<g class="slide" style="animation-delay:14.4s">
<rect width="400" height="220" rx="22" fill="url(#glassFill)" stroke="rgba(255,255,255,.14)"/>
<g clip-path="url(#clipCard)">
<rect width="180" height="320" y="-50" fill="url(#sheenGrad)" class="sheen"/>
</g>
<g transform="translate(34 54)">
<text fill="white" class="font-sans" font-size="25" font-weight="700">Stream</text>
<text y="38" fill="#8B949E" class="font-sans" font-size="13">
<tspan x="0" dy="1.4em">Media discovery and streaming platform</tspan>
