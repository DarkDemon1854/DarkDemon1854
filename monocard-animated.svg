<tspan x="0" dy="1.4em">Encrypted storage platform</tspan>
<tspan x="0" dy="1.4em">for centralized 2FA management</tspan>
</text>
</g>
</g>

<!-- 10 -->
<g class="slide" style="animation-delay:32.4s">
<rect width="400" height="220" rx="22" fill="url(#glassFill)" stroke="rgba(255,255,255,.14)"/>
<g clip-path="url(#clipCard)">
